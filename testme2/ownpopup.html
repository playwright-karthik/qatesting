<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karthik HTML Sandbox - New Tab Edition</title>
    <style>
        :root {
            --primary-color: #2b6cb0;
            --primary-hover: #1a446c;
            --bg-color: #f8fafc;
            --panel-bg: #ffffff;
            --border-color: #e2e8f0;
            --text-color: #2d3748;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Control Navigation Bar */
        header {
            background-color: var(--panel-bg);
            padding: 12px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            flex-shrink: 0;
        }

        .header-title h1 {
            color: var(--primary-color);
            font-size: 20px;
            font-weight: 700;
        }

        .header-title p {
            color: #718096;
            font-size: 12px;
            margin-top: 2px;
        }

        button {
            padding: 12px 28px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            transition: all 0.15s ease;
            box-shadow: 0 4px 6px rgba(43, 108, 176, 0.15);
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        /* Workspace Wrapper */
        .workspace {
            display: flex;
            flex-direction: column;
            flex: 1;
            height: calc(100vh - 70px);
            width: 100%;
            background-color: var(--panel-bg);
        }

        .pane-label {
            background-color: #edf2f7;
            padding: 10px 24px;
            font-size: 13px;
            font-weight: 700;
            color: #4a5568;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-color);
        }

        textarea {
            width: 100%;
            flex: 1;
            font-family: "Fira Code", Monaco, Consolas, monospace;
            font-size: 14px;
            line-height: 1.6;
            padding: 24px;
            border: none;
            background-color: #fafafa;
            color: #1a202c;
            resize: none;
            outline: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title">
            <h1>Karthik's HTML Testing Sandbox</h1>
            <p>Approach B — Code opens inside a clean, standalone Browser Tab</p>
        </div>
        <button id="run-popup">Launch in New Tab ↗</button>
    </header>

    <div class="workspace">
        <div class="pane-label">Paste Test HTML Payload</div>
        <textarea id="html-input" placeholder="&#10;&#10;<div id='card'>KarthikLocal---Assertions</div>" spellcheck="false"></textarea>
    </div>

    <script>
        const htmlInput = document.getElementById('html-input');
        const runBtn = document.getElementById('run-popup');

        function launchPopup() {
            const userCode = htmlInput.value;
            
            // Open a completely clean window target context
            const newWindow = window.open();
            
            if (newWindow) {
                newWindow.document.open();
                newWindow.document.write(userCode);
                newWindow.document.close();
            } else {
                alert("Popup Blocked! Please check your browser settings or ensure Playwright handles the target popup trigger event.");
            }
        }

        // Trigger on click
        runBtn.addEventListener('click', launchPopup);

        // Shortcut: Command + Enter or Ctrl + Enter triggers the popup launch
        htmlInput.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                launchPopup();
            }
        });
    </script>
</body>
</html>
