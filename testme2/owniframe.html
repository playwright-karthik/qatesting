<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karthik HTML Sandbox - Test Environment</title>
    <style>
        :root {
            --primary-color: #2b6cb0;
            --primary-hover: #1a446c;
            --bg-color: #f8fafc;
            --panel-bg: #ffffff;
            --border-color: #e2e8f0;
            --text-color: #2d3748;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Header Navigation Bar */
        header {
            background-color: var(--panel-bg);
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 65px;
            flex-shrink: 0;
        }

        .header-title h1 {
            color: var(--primary-color);
            font-size: 18px;
            font-weight: 700;
        }

        .header-title p {
            color: #718096;
            font-size: 12px;
            margin-top: 2px;
        }

        button {
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            transition: background-color 0.15s ease;
            box-shadow: 0 2px 4px rgba(43, 108, 176, 0.2);
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        /* Main Split Container */
        .workspace {
            display: flex;
            flex: 1;
            height: calc(100vh - 65px);
            width: 100%;
        }

        /* Left Pane: Script Input (35% Width) */
        .editor-pane {
            width: 35%;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            background-color: var(--panel-bg);
        }

        .pane-label {
            background-color: #edf2f7;
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 700;
            color: #4a5568;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-color);
        }

        textarea {
            width: 100%;
            flex: 1;
            font-family: "Fira Code", Monaco, Consolas, monospace;
            font-size: 13px;
            line-height: 1.6;
            padding: 16px;
            border: none;
            background-color: #fafafa;
            color: #1a202c;
            resize: none;
            outline: none;
        }

        /* Right Pane: Interactive Target Output (65% Width) */
        .output-pane {
            width: 65%;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
        }

        iframe {
            width: 100%;
            flex: 1;
            border: none;
            background-color: #ffffff;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title">
            <h1>Karthik's HTML Testing Sandbox</h1>
            <p>Approach A Side-by-Side View — Optimized for Playwright Frame Locators</p>
        </div>
        <button id="run-iframe">Run inside Frame ❯</button>
    </header>

    <div class="workspace">
        <div class="editor-pane">
            <div class="pane-label">HTML Source Code</div>
            <textarea id="html-input" placeholder="&#10;&#10;<div id='card'>KarthikLocal---Assertions</div>" spellcheck="false"></textarea>
        </div>

        <div class="output-pane">
            <div class="pane-label">Rendered Target Output (Interactive Page View)</div>
            <iframe id="output-frame" name="sandbox-frame" sandbox="allow-scripts allow-same-origin"></iframe>
        </div>
    </div>

    <script>
        const htmlInput = document.getElementById('html-input');
        const outputFrame = document.getElementById('output-frame');
        const runBtn = document.getElementById('run-iframe');

        function executeCode() {
            const userCode = htmlInput.value;
            const frameDoc = outputFrame.contentDocument || outputFrame.contentWindow.document;
            
            frameDoc.open();
            frameDoc.write(userCode);
            frameDoc.close();
        }

        // Trigger on button click
        runBtn.addEventListener('click', executeCode);

        // Optional: Trigger rendering automatically on CMD+Enter or CTRL+Enter
        htmlInput.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                executeCode();
            }
        });
    </script>
</body>
</html>
