<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe Testing Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f9;
        }
        .container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .iframe-card {
            flex: 1;
            min-width: 450px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        iframe {
            width: 100%;
            height: 500px;
            border: 2px solid #ccc;
            border-radius: 4px;
        }
        h2 {
            color: #333;
            font-size: 1.2rem;
            margin-top: 0;
        }
    </style>
</head>
<body>

    <h1>Automated Testing - Iframe Sandbox</h1>
    <p>This page embeds your test pages into iframes for Playwright/Selenium validation.</p>
    
    <div class="container">
        <div class="iframe-card">
            <h2>Frame 1: HTML Elements (testme3)</h2>
            <iframe 
                src="https://playwright-karthik.github.io/qatesting/testme3/index.html" 
                title="HTML Elements Test"
                name="iframe-elements">
            </iframe>
        </div>

        <div class="iframe-card">
            <h2>Frame 2: Keyboard Actions (testme4)</h2>
            <iframe 
                src="https://playwright-karthik.github.io/qatesting/testme4/scriptfolder/testme4/index.html" 
                title="Keyboard Actions Test"
                name="iframe-keyboard">
            </iframe>
        </div>
    </div>

</body>
</html>
