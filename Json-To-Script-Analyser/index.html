<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Json To Script Analyser</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <h1>Json To Script Analyser</h1>
        <p class="subtle">Recorder JSON to Playwright script verb mapping</p>
      </div>
      <div class="actions">
        <button id="downloadJsonButton" type="button" disabled>JSON</button>
        <button id="downloadCsvButton" type="button" disabled>CSV</button>
      </div>
    </header>

    <section class="upload-panel" aria-label="Upload files">
      <label class="file-box">
        <span>Recorder JSON</span>
        <input id="jsonFile" type="file" accept=".json,application/json">
      </label>
      <label class="file-box">
        <span>Generated Script</span>
        <input id="scriptFile" type="file" accept=".js,text/javascript,text/plain">
      </label>
      <button id="analyzeButton" class="primary" type="button">Analyze</button>
    </section>

    <section id="summary" class="summary-grid" aria-live="polite"></section>

    <section class="tabs" aria-label="Analysis views">
      <button class="tab-button active" type="button" data-tab="verbSummary">Verb Summary</button>
      <button class="tab-button" type="button" data-tab="actionTable">Action Mapping</button>
      <button class="tab-button" type="button" data-tab="selectorPriority">Selector Priority</button>
      <button class="tab-button" type="button" data-tab="findings">Findings</button>
    </section>

    <section id="verbSummary" class="tab-panel active"></section>
    <section id="actionTable" class="tab-panel"></section>
    <section id="selectorPriority" class="tab-panel"></section>
    <section id="findings" class="tab-panel"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>
