<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>cpuhog - Heavy JS while playing</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body style="font-family:sans-serif;padding:16px">
  <h2>cpuhog.html (STRESS)</h2>
  <p>Plays stream and runs heavy JS loop periodically.</p>

  <video id="video" autoplay muted playsinline style="width:100%;max-width:960px;background:#000"></video>
  <pre id="log" style="max-width:960px;white-space:pre-wrap"></pre>

  <script>
    const logEl = document.getElementById('log');
    const video = document.getElementById('video');
    const log = (m)=> logEl.textContent = `[${new Date().toISOString()}] ${m}\n` + logEl.textContent;

    const url = "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8";
    const safePlay = () => video.play().catch(()=>{});

    if (Hls.isSupported()) {
      const hls = new Hls();
      hls.on(Hls.Events.MANIFEST_PARSED, () => { log("play"); safePlay(); });
      hls.on(Hls.Events.ERROR, (_, d) => log(`hls:error ${d.type}/${d.details}`));
      hls.loadSource(url);
      hls.attachMedia(video);
    } else {
      video.src = url; safePlay();
    }

    // Heavy work every 5s for ~300ms
    setInterval(() => {
      const start = performance.now();
      let x = 0;
      while (performance.now() - start < 300) {
        x += Math.sqrt(Math.random() * 1e6);
      }
      log("cpu spike done " + x.toFixed(2));
    }, 5000);
  </script>
</body>
</html>
