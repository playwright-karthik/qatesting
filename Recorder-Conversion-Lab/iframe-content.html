<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iframe Fixture</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="iframe-body">
  <main class="iframe-shell">
    <h1>Iframe Fixture</h1>
    <label for="iframe-input">Iframe Input</label>
    <input id="iframe-input" type="text">
    <button id="iframe-button" type="button">Iframe Button</button>
    <p id="iframe-status">Ready</p>
  </main>
  <script>
    document.getElementById('iframe-button').addEventListener('click', function () {
      document.getElementById('iframe-status').textContent = 'Iframe button clicked';
    });
  </script>
</body>
</html>
