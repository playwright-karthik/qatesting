<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON RequestData Extractor</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            background-color: #1e293b;
            padding: 15px 24px;
            border-bottom: 1px solid #334155;
            flex-shrink: 0;
        }
        header h1 {
            margin: 0;
            font-size: 20px;
            color: #f8fafc;
        }
        header p {
            margin: 5px 0 0 0;
            font-size: 13px;
            color: #94a3b8;
        }
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            background-color: #0f172a;
        }
        /* Left Pane Styling */
        .left-pane {
            width: 45%;
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
            padding: 20px;
            background-color: #1e293b;
        }
        .pane-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        textarea {
            flex: 1;
            width: 100%;
            padding: 15px;
            border: 1px solid #475569;
            border-radius: 6px;
            font-family: 'Fira Code', Consolas, Monaco, monospace;
            font-size: 13px;
            background-color: #0f172a;
            color: #e2e8f0;
            resize: none;
            outline: none;
        }
        textarea:focus {
            border-color: #3b82f6;
        }
        .action-area {
            margin-top: 15px;
            flex-shrink: 0;
        }
        .btn-process {
            width: 100%;
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-process:hover {
            background-color: #1d4ed8;
        }
        /* Right Pane Styling */
        .right-pane {
            width: 55%;
            display: flex;
            flex-direction: column;
            padding: 20px;
            background-color: #0f172a;
        }
        .copy-btn {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .copy-btn:hover {
            background-color: #059669;
        }
        pre {
            flex: 1;
            margin: 0;
            background-color: #1e293b;
            color: #38bdf8;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #334155;
            overflow: auto;
            font-family: 'Fira Code', Consolas, Monaco, monospace;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .error-message {
            color: #ef4444;
            background-color: #451a1a;
            border: 1px solid #7f1d1d;
            padding: 12px;
            border-radius: 6px;
            margin-top: 15px;
            font-size: 13px;
            display: none;
        }
    </style>
</head>
<body>

<header>
    <h1>RequestData JSON Extractor</h1>
    <p>Paste the raw payload on the left to unpack, clean, and format the escaped inner request layout on the right.</p>
</header>

<div class="main-container">
    <div class="left-pane">
        <div class="pane-title">Raw JSON Payload Input</div>
        <textarea id="jsonInput" placeholder="Paste your massive wrapped JSON here..."></textarea>
        
        <div class="action-area">
            <button class="btn-process" onclick="processJSON()">Extract & Parse RequestData →</button>
        </div>
        <div id="errorMessage" class="error-message"></div>
    </div>

    <div class="right-pane">
        <div class="pane-title">
            <span>Unescaped, Pretty-Printed Target</span>
            <button id="copyBtn" class="copy-btn" onclick="copyToClipboard()">Copy JSON</button>
        </div>
        <pre id="jsonOutput">// Extracted JSON hierarchy will display here...</pre>
    </div>
</div>

<script>
function processJSON() {
    const inputData = document.getElementById('jsonInput').value.trim();
    const errorDiv = document.getElementById('errorMessage');
    const outputDiv = document.getElementById('jsonOutput');
    
    // Reset output panels
    errorDiv.style.display = 'none';
    errorDiv.innerText = '';
    
    if (!inputData) {
        showError("The source content area cannot be empty.");
        return;
    }

    try {
        const rootJson = JSON.parse(inputData);
        const nestedStringifiedData = rootJson?.data?.testUpdate?.testRequestData?.requestData;
        
        if (!nestedStringifiedData) {
            showError("JSON parsed successfully, but 'requestData' could not be targeted in the expected inner nested path.");
            return;
        }
        
        const finalizedOutputJson = JSON.parse(nestedStringifiedData);
        outputDiv.textContent = JSON.stringify(finalizedOutputJson, null, 4);
        
    } catch (err) {
        showError("JSON structure validation failure: " + err.message);
    }
}

function showError(msg) {
    const errorDiv = document.getElementById('errorMessage');
    errorDiv.innerText = msg;
    errorDiv.style.display = 'block';
    document.getElementById('jsonOutput').textContent = '// Operation aborted due to script errors.';
}

function copyToClipboard() {
    const content = document.getElementById('jsonOutput').textContent;
    const btn = document.getElementById('copyBtn');
    
    if (content.startsWith('//')) {
        alert("The editor contains no parseable data structures to clone.");
        return;
    }

    navigator.clipboard.writeText(content).then(() => {
        btn.innerText = "Copied!";
        btn.style.backgroundColor = "#059669";
        
        setTimeout(() => {
            btn.innerText = "Copy JSON";
            btn.style.backgroundColor = "#10b981";
        }, 1800);
    }).catch(error => {
        alert("System restricted clipboard operational channel access: " + error);
    });
}
</script>

</body>
</html>
