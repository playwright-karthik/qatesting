<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON RequestData Extractor</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f8;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 {
            margin-top: 0;
            color: #1e293b;
            font-size: 24px;
        }
        p {
            color: #64748b;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-family: monospace;
            font-size: 14px;
            box-sizing: border-box;
            resize: vertical;
            background-color: #f8fafc;
        }
        .btn-container {
            margin: 15px 0;
        }
        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        .error {
            color: #dc2626;
            background-color: #fee2e2;
            padding: 12px;
            border-radius: 6px;
            margin-top: 15px;
            display: none;
            font-weight: 500;
        }
        .output-header {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .output-header h2 {
            font-size: 18px;
            color: #1e293b;
            margin: 0;
        }
        pre {
            background-color: #0f172a;
            color: #38bdf8;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.5;
            max-height: 600px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>RequestData JSON Extractor & Unescaper</h1>
    <p>Paste your raw JSON payload below to extract and automatically format the escaped <code>requestData</code> string.</p>
    
    <textarea id="jsonInput" placeholder="Paste your full JSON here..."></textarea>
    
    <div class="btn-container">
        <button onclick="processJSON()">Extract & Clean JSON</button>
    </div>

    <div id="errorMessage" class="error"></div>

    <div class="output-header">
        <h2>Unescaped, Formatted Output:</h2>
    </div>
    <pre id="jsonOutput">// Formatted JSON will appear here...</pre>
</div>

<script>
function processJSON() {
    const inputTextArea = document.getElementById('jsonInput').value.trim();
    const errorDiv = document.getElementById('errorMessage');
    const outputPre = document.getElementById('jsonOutput');
    
    // Reset states
    errorDiv.style.display = 'none';
    errorDiv.innerText = '';
    
    if (!inputTextArea) {
        showError("Please paste your JSON first.");
        return;
    }

    try {
        // Step 1: Parse the main copied JSON wrapper
        const parsedMain = JSON.parse(inputTextArea);
        
        // Step 2: Safely access the deeply nested requestData property
        const escapedRequestData = parsedMain?.data?.testUpdate?.testRequestData?.requestData;
        
        if (!escapedRequestData) {
            showError("Could not find 'requestData' in the expected JSON pathway (data -> testUpdate -> testRequestData -> requestData).");
            return;
        }
        
        // Step 3: Parse the stringified/escaped inner JSON
        const cleanInnerJSON = JSON.parse(escapedRequestData);
        
        // Step 4: Output it pretty-printed (4 spaces indentation)
        outputPre.textContent = JSON.stringify(cleanInnerJSON, null, 4);
        
    } catch (e) {
        showError("Invalid JSON structure: " + e.message);
    }
}

function showError(msg) {
    const errorDiv = document.getElementById('errorMessage');
    errorDiv.innerText = msg;
    errorDiv.style.display = 'block';
    document.getElementById('jsonOutput').textContent = '// Error parsing JSON.';
}
</script>

</body>
</html>
