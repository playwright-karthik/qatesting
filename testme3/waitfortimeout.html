<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playwright waitForTimeout Verification Sandbox</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e1e4e8;
            text-align: center;
        }
        .timer-display {
            font-family: monospace;
            font-size: 2.5rem;
            color: #2c3e50;
            margin: 20px 0;
            font-weight: bold;
        }
        .metric-row {
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
            background: #fafafa;
            padding: 10px;
            border-radius: 4px;
        }
        .interactive-btn {
            background-color: #bdc3c7;
            color: #7f8c8d;
            padding: 15px 30px;
            border: none;
            border-radius: 4px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: not-allowed;
            transition: all 0.3s ease;
            width: 100%;
        }
        .interactive-btn.unlocked {
            background-color: #2ecc71;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3);
        }
        .interactive-btn.unlocked:hover {
            background-color: #27ae60;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
            background: #e74c3c;
            color: white;
        }
        .status-badge.ready {
            background: #2ecc71;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>⏱️ Async Automation Wait Sandbox</h2>
        <p>This page features a strict programmatic gate delay framework.</p>
        
        <div class="metric-row">
            <div>
                <div style="font-size: 0.8rem; color: #666;">ELAPSED TIME</div>
                <div id="elapsed" style="font-weight: bold; color: #2980b9;">0.00s</div>
            </div>
            <div>
                <div style="font-size: 0.8rem; color: #666;">GATE RESOLUTION</div>
                <div id="status" class="status-badge">LOCKED</div>
            </div>
        </div>

        <div class="timer-display" id="timer">5000ms</div>

        <button id="target-action-btn" class="interactive-btn" disabled onclick="handleExecutionClick()">
            Locked Action Element
        </button>
    </div>

    <script>
        const TARGET_DELAY = 5000; // 5 seconds target gateway duration
        const startTime = performance.now();
        
        const timerElement = document.getElementById('timer');
        const elapsedElement = document.getElementById('elapsed');
        const statusElement = document.getElementById('status');
        const actionButton = document.getElementById('target-action-btn');

        const trackingInterval = setInterval(() => {
            const currentTime = performance.now();
            const elapsed = currentTime - startTime;
            const remaining = Math.max(0, TARGET_DELAY - elapsed);

            // Update live ticking metric views
            elapsedElement.innerText = (elapsed / 1000).toFixed(2) + "s";
            timerElement.innerText = Math.round(remaining) + "ms";

            // Once wait condition completes, unlock the action target element
            if (elapsed >= TARGET_DELAY) {
                clearInterval(trackingInterval);
                timerElement.innerText = "0ms";
                statusElement.innerText = "READY";
                statusElement.className = "status-badge ready";
                
                actionButton.removeAttribute('disabled');
                actionButton.className = "interactive-btn unlocked";
                actionButton.innerText = "💥 Execute Target Action Click";
            }
        }, 30); // High-frequency update loop for smooth millisecond tracking

        function handleExecutionClick() {
            actionButton.innerText = "🎉 Action Success Verified!";
            actionButton.style.backgroundColor = "#9b59b6";
        }
    </script>
</body>
</html>
