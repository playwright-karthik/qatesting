<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Continuous Performance Tracker Sandbox</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            max-width: 650px;
            margin: 50px auto;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #d0d7de;
            text-align: center;
        }
        .timer-display {
            font-family: 'Courier New', Courier, monospace;
            font-size: 2.8rem;
            color: #1a1a1a;
            margin: 20px 0;
            font-weight: bold;
            background: #24292e;
            color: #ff79c6;
            padding: 15px;
            border-radius: 8px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.2);
        }
        .metric-matrix {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        .metric-box {
            background: #fafafa;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #e1e4e8;
        }
        .interactive-btn {
            background-color: #bdc3c7;
            color: #7f8c8d;
            padding: 16px 30px;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: not-allowed;
            transition: all 0.2s ease;
            width: 100%;
        }
        .interactive-btn.unlocked {
            background-color: #2ecc71;
            color: white;
            cursor: pointer;
        }
        .interactive-btn.unlocked:hover {
            background-color: #27ae60;
        }
        .interactive-btn.clicked {
            background-color: #9b59b6;
            color: white;
            cursor: pointer;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
            background: #e74c3c;
            color: white;
        }
        .status-badge.ready { background: #2ecc71; }
        .status-badge.clicked-active { background: #9b59b6; }
    </style>
</head>
<body>

    <div class="card">
        <h2>⏱️ Continuous Lifecycle Telemetry Sandbox</h2>
        <p class="instruction">Timers run non-stop until an explicit browser URL reload is fired.</p>
        
        <div class="metric-matrix">
            <div class="metric-box">
                <div style="font-size: 0.78rem; color: #666; font-weight: bold;">GATE RESOLUTION</div>
                <div id="status" class="status-badge" style="margin-top: 5px;">LOCKED</div>
            </div>
            <div class="metric-box">
                <div style="font-size: 0.78rem; color: #666; font-weight: bold;">LAST CLICK CAPTURED AT</div>
                <div id="click-timestamp" style="font-weight: bold; color: #9b59b6; font-size: 1.1rem; margin-top: 3px;">&lt;no interaction&gt;</div>
            </div>
        </div>

        <div class="timer-display" id="elapsed-counter">0.00s</div>
        <div id="gate-timer" style="font-weight: bold; color: #e67e22; margin-bottom: 20px;">5000ms REMAINING UNTIL GATE OPEN</div>

        <button id="target-action-btn" class="interactive-btn" disabled onclick="handleExecutionClick()">
            Locked Action Element
        </button>
    </div>

    <script>
        const TARGET_DELAY = 5000; // Threshold gap gate configuration
        const startTime = performance.now();
        
        let gateUnlocked = false;
        let interactionCount = 0;

        const elapsedCounter = document.getElementById('elapsed-counter');
        const gateTimer = document.getElementById('gate-timer');
        const statusElement = document.getElementById('status');
        const clickTimestamp = document.getElementById('click-timestamp');
        const actionButton = document.getElementById('target-action-btn');

        // Infinite Tracking Loop Loop Execution
        setInterval(() => {
            const currentTime = performance.now();
            const elapsed = currentTime - startTime;
            
            // Keep the main clock ticking non-stop
            elapsedCounter.innerText = (elapsed / 1000).toFixed(2) + "s";

            if (!gateUnlocked) {
                const remaining = Math.max(0, TARGET_DELAY - elapsed);
                gateTimer.innerText = Math.round(remaining) + "ms REMAINING UNTIL GATE OPEN";

                if (elapsed >= TARGET_DELAY) {
                    gateUnlocked = true;
                    gateTimer.innerText = "🔓 GATE OPENED (Timers Running Natively)";
                    gateTimer.style.color = "#27ae60";
                    
                    statusElement.innerText = "READY";
                    statusElement.className = "status-badge ready";
                    
                    actionButton.removeAttribute('disabled');
                    actionButton.className = "interactive-btn unlocked";
                    actionButton.innerText = "💥 Execute Target Action Click";
                }
            }
        }, 10); // High-frequency polling loop

        function handleExecutionClick() {
            const clickTime = (performance.now() - startTime) / 1000;
            interactionCount++;
            
            statusElement.innerText = "INTERACTED";
            statusElement.className = "status-badge clicked-active";
            
            // Log the exact moment the interaction event hit the DOM thread
            clickTimestamp.innerText = clickTime.toFixed(3) + "s";
            
            actionButton.className = "interactive-btn clicked";
            actionButton.innerText = `🎉 Click #${interactionCount} Logged Success!`;
        }
    </script>
</body>
</html>
