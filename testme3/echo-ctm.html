<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CTM Direct Script One-Liner Generator</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #f4f7f6; }
        textarea { width: 100%; height: 200px; font-family: monospace; }
        button { background: #2ecc71; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        #output { background: #2c3e50; color: #fff; padding: 15px; font-family: monospace; word-break: break-all; white-space: pre-wrap; margin-top: 15px; border-radius: 4px; }
    </style>
</head>
<body>
    <h2>Paste Raw FE JSON</h2>
    <textarea id="input" placeholder="Paste raw fe.json here..."></textarea>
    <br>
    <button onclick="convert()">Generate Direct Echo One-Liner</button>
    
    <h2>Copy this Command</h2>
    <div id="output">Your single line command will appear here...</div>

    <script>
        function convert() {
            const rawInput = document.getElementById('input').value.trim();
            if (!rawInput) return alert("Please paste JSON first");

            try {
                // Minify the input JSON to ensure there are no formatting spaces
                const minifiedJson = JSON.stringify(JSON.parse(rawInput));

                const payload = {
                    "Capabilities": {
                        "common.test.max-downloads-bytes": "<Bytes.Invalid>",
                        "common.test.test-id": "S4444444",
                        "test.common.use-ipv6": false,
                        "test.common.actual-runtime": "07/13/2026 08:01:44",
                        "common.test.flag.ignore-file-size-limits": true,
                        "test.common.transaction-script": minifiedJson, // Injected as raw script string
                        "test.web-browser.monitor-version-type": "Stable",
                        "test.web.flags.capture-screenshot": true,
                        "test.web-browser.filmstrip-capture-frequency": 200,
                        "test.web-browser.wait-for-no-request-time": 0,
                        "test.scripted-web-browser.browser-type": "chrome",
                        "test.scripted-web-browser.script-engine-type": "playwright",
                        "test.common.authentication-method": "None",
                        "test.scripted-web-browser.mobile-user-agent": "",
                        "test.scripted-web-browser.file-reference-data": [],
                        "test.web.flags.latitude": 12.9833,
                        "test.web.flags.longitude": 77.5833,
                        "test.web.flags.capture-headers": true,
                        "test.web.flags.capture-response-content": true,
                        "test.common.url": "cp-puppeteer-http://localhost/",
                        "test.common.keep-alive-fd": "264"
                    },
                    "Settings": {
                        "DumpDiagnosticsInformation": true,
                        "LogLevel": "debug",
                        "DataDirectory": "/var/CatchPoint/Agent/Plugins/Playwright"
                    }
                };

                // Create the clean executable shell string
                const command = "echo '" + JSON.stringify(payload) + "' | /opt/CatchPoint/Agent/Plugins/Native/Playwright/launcher.sh";
                document.getElementById('output').innerText = command;
            } catch(e) {
                alert("Invalid JSON: " + e.message);
            }
        }
    </script>
</body>
</html>
