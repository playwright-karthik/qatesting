<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTM Playwright One-Liner Generator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
        }
        h2 { color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; }
        textarea {
            width: 100%;
            height: 250px;
            font-family: monospace;
            font-size: 14px;
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #2ecc71;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin: 15px 0;
        }
        button:hover { background-color: #27ae60; }
        .output-container {
            position: relative;
            background-color: #2c3e50;
            color: #fff;
            padding: 15px;
            border-radius: 4px;
        }
        #outputCommand {
            margin: 0;
            font-family: monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-all;
            background: #34495e;
            padding: 10px;
            border-radius: 4px;
            user-select: all; /* Allows easy triple-click selection of the whole line */
        }
        .copy-btn {
            position: absolute;
            top: 20px;
            right: 25px;
            background-color: #e67e22;
            padding: 5px 10px;
            font-size: 12px;
            margin: 0;
        }
        .copy-btn:hover { background-color: #d35400; }
        .error { color: #e74c3c; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

    <h2>1. Paste Raw Frontend Record JSON</h2>
    <textarea id="inputJson" placeholder="Paste your raw fe.json context here..."></textarea>
    
    <button onclick="generateCommand()">Generate CLI One-Liner</button>
    <div id="errorMessage" class="error"></div>

    <h2>2. Executable Agent One-Liner (Click inside to highlight everything)</h2>
    <div class="output-container">
        <button class="copy-btn" onclick="copyCommand()">Copy Line</button>
        <div id="outputCommand">The formatted one-liner string will display here...</div>
    </div>

    <script>
        function generateCommand() {
            const inputField = document.getElementById('inputJson').value.trim();
            const errorField = document.getElementById('errorMessage');
            const outputField = document.getElementById('outputCommand');
            
            errorField.innerText = "";
            
            if (!inputField) {
                errorField.innerText = "❌ Please paste a valid JSON block first.";
                return;
            }

            try {
                const parsedRecordJson = JSON.parse(inputField);
                const cleanJsonString = JSON.stringify(parsedRecordJson);

                const payload = {
                    "Capabilities": {
                        "common.test.max-downloads-bytes": "<Bytes.Invalid>",
                        "common.test.test-id": "S444444",
                        "test.common.use-ipv6": false,
                        "test.common.actual-runtime": new Date().toLocaleString('en-US'),
                        "common.test.flag.ignore-file-size-limits": true,
                        "test.common.transaction-script": "await page.setViewportSize({ width: 1024, height: 768 });\nawait page.goto(\"https://playwright-karthik.github.io/qatesting/testme3/checkbox-radio.html\");",
                        "RecorderJson": cleanJsonString,
                        "test.web-browser.monitor-version-type": "Stable",
                        "test.web.flags.capture-screenshot": true,
                        "test.web-browser.filmstrip-capture-frequency": 200,
                        "test.web.flags.capture-headers": true,
                        "test.web-browser.viewport-width": 1024,
                        "test.web-browser.viewport-height": 768,
                        "test.web-browser.wait-for-no-request-time": 0,
                        "test.scripted-web-browser.mobile-user-agent": "",
                        "test.scripted-web-browser.file-reference-data": [],
                        "test.web.flags.latitude": 12.9833,
                        "test.web.flags.longitude": 77.5833,
                        "test.scripted-web-browser.browser-type": "chrome",
                        "test.scripted-web-browser.script-engine-type": "playwright",
                        "test.common.authentication-method": "None",
                        "test.common.url": "cp-playwright-http://localhost/"
                    },
                    "Settings": {
                        "CaptureNetLog": true,
                        "DumpDiagnosticsInformation": true,
                        "LogLevel": "debug",
                        "DataDirectory": "/var/CatchPoint/Agent/Plugins/Playwright"
                    }
                };

                const finalOneLiner = JSON.stringify(payload);

                // Combined into a clean string statement with space separation instead of line breaks
                const executableScript = `echo '${finalOneLiner}' | /opt/CatchPoint/Agent/Plugins/Native/Playwright/launcher.sh`;
                
                outputField.innerText = executableScript;

            } catch (e) {
                errorField.innerText = "❌ Invalid JSON syntax: " + e.message;
            }
        }

        function copyCommand() {
            const text = document.getElementById('outputCommand').innerText;
            if(text && !text.startsWith("The formatted")) {
                navigator.clipboard.writeText(text);
                alert("📋 One-liner copied to clipboard!");
            }
        }
    </script>
</body>
</html>
